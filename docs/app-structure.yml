# docs/app-structure.yml — repo-local opt-in marker for grasp-app-structure.
#
# Phase P1 (issue #304, epic #303): tadaify-app is the first product repo to adopt
# the skill. strict:false → planning / report-only — this marker enforces NOTHING
# yet. It declares the COMPLETE local-dev port manifest and opts the repo into the
# validator's report mode. Strict enforcement is flipped on only by P8, after the
# repo actually passes (P2–P7 convert the structure first).
#
# Contract owner: agents-local/skills/grasp-app-structure/reference/structure-spec.md
# Port-manifest schema owner: .../reference/ports.md
# Central port registry: agents-local/docs/business-app-port-ranges.yml (app: tadaify)

contract: grasp-business-app-structure
repo_kind: business-stack-app
stack:
  frontend: react
  router: rr7
  db: supabase
strict: false                       # planning / report-only (P1)

migrations:
  # Grandfather cutoff (P6, issue #309). The migration header standard, the
  # generated index (supabase/MIGRATIONS.md), and the schema.sql + GDPR-pair
  # gates bind ONLY migrations whose YYYYMMDDHHMMSS timestamp is strictly
  # GREATER than this value. The 19 pre-cutoff legacy files (latest
  # 20260531000002_feedback.sql) are exempt and stay byte-for-byte untouched.
  # Contract: agents-local/skills/grasp-app-structure/reference/migrations.md
  cutoff: 20260531000002

local_dev:
  # port_namespace MUST equal supabase/config.toml project_id ("tadaify").
  port_namespace: tadaify
  # Ports are governed by `ports.yaml` at the repo root — the single source of truth
  # (grasp-running-local-apps). This block mirrors it for humans; `ports.yaml` is authoritative,
  # and supersedes the old central agents-local/docs/business-app-port-ranges.yml row.
  range: [44200, 44229]             # tadaify-app's registered high-band slice (Mac-safe)
  container_pattern: "supabase_<service>_<project_id>"
  services:
    # --- App / preview host ports (build tooling, not config.toml; pinned via --strictPort). ---
    app: 44200                      # react-router dev --port 44200 --strictPort
    test_preview: 44201             # vite preview --port 44201 --strictPort
    # --- Supabase local stack — EVERY port supabase/config.toml can expose (reserved even when off). ---
    supabase_api: 44210             # [api] Kong/API gateway
    db: 44211                       # [db] Postgres
    shadow: 44212                   # [db] shadow_port — migration shadow/diff database
    studio: 44213                   # [studio]
    inbucket: 44214                 # [inbucket] mail web UI
    inbucket_smtp: 44215            # [inbucket] smtp_port (off by default)
    inbucket_pop3: 44216            # [inbucket] pop3_port (off by default)
    analytics: 44217                # [analytics] Logflare (backend = postgres)
    edge_inspector: 44218           # [edge_runtime] inspector_port — edge function Chrome inspector
    pooler: 44219                   # [db.pooler] Supavisor connection pooler (off by default)
  # Ad-hoc pool (worktree previews + ephemeral Supabase e2e bands): see `ports.yaml` `dynamic`.
  dynamic: [44220, 44229]
