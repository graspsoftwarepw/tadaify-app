      - app/components/AffiliatePanel.tsx
      - app/components/AppSidebarDesignAccordion.tsx
      - app/components/DesignBreadcrumbStepper.tsx
      - app/components/DesignPanel.tsx
      - app/components/InsightsPanel.tsx
      - app/lib/insights/queries.ts
      - app/components/HomepagePanel.tsx
      - app/components/DomainPanel.tsx
      - app/components/FeedbackPanel.tsx
      - app/components/SettingsPanel.tsx
      - app/lib/register-welcome-copy.ts
      - app/lib/onboarding-state.ts
      - app/components/LivePreviewPane.tsx
      - app/lib/theme-utils.ts
      - app/lib/worker-auth.ts
    requirements:
      business:
        - BR-DASH-001
        - BR-DASH-002
        - BR-DASH-005
        - BR-DASH-007
        - BR-DASH-008
      technical:
        - TR-tadaify-005

  APP-DESIGN:
