# Module registry — ownership source of truth (tadaify-app)
#
# Phase P4 (issue tadaify-app#307, epic #303): the code-level ownership contract,
# consumed by bin/maps-gen / bin/maps-check and `bin/req`. Every tracked non-test source file under
# app/{routes,components,lib} is owned by EXACTLY one area (a feature module or SHARED).
# Cross-area imports are declared in the consumer's `uses[]`, never duplicated into a
# second area's `owns[]`. `used_by[]` is GENERATED by the validator/P5 — never authored here.
#
# tadaify-app is React Router 7 (Remix-merged): routes are a flat dotted registry in
# app/routes.ts; feature UI lives in app/components/<feature>/; logic in app/lib/.
#
# `routes[]` entries are the paths declared via route(...)/index(...)/layout(...) in
# app/routes.ts. Business requirement ids resolve to docs/requirements/business/*.md (P3);
# technical ids to docs/requirements/technical/*.md.

modules:
  ONBOARDING:
    label: "Onboarding wizard"
    routes:
      - onboarding/welcome
      - onboarding/social
      - onboarding/profile
      - onboarding/template
      - onboarding/tier
      - onboarding/complete
    owns:
      - app/routes/onboarding.tsx
      - app/routes/onboarding.*.tsx
      - app/components/OnboardingPreviewPane.tsx
      - app/lib/onboarding-*.ts
    uses:
      - app/components/landing/MotionLogo.tsx
      - app/components/ThemeToggleButton.tsx
      - app/lib/avatar-validator.ts
      - app/lib/tier-gate.ts
      - app/routes/api.avatar.$key.ts
    requirements:
      business:
        - BR-ONBOARDING-001
        - BR-ONBOARDING-002
        - BR-ONBOARDING-003
        - BR-ONBOARDING-004
        - BR-ONBOARDING-005
        - BR-ONBOARDING-006
      technical:
        - TR-tadaify-006

  APP-DASHBOARD:
    label: "App dashboard shell"
    routes:
