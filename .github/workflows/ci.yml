name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "mockups/**"
      - "claude-reports/**"
      - "docs/**"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "mockups/**"
      - "claude-reports/**"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      # Pillar-0 generated maps (grasp-app-structure, #308): fail the build if the
      # committed docs/maps/*.md drifted from the route registry / records (maps-check),
      # or if any view/module is an orphan (req orphans). Both pure Node readers, no deps.
      - name: Maps — staleness check
        run: ./bin/maps-check

      - name: Maps — orphan check
        run: ./bin/req orphans
